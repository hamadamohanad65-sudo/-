app = "hanter"
primary_region = "fra"

[build]

[env]
  PORT = "8080"

[[mounts]]
  source = "hanter_auth_info"
  destination = "/app/auth_info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
